openapi: 3.1.0
info:
  title: Galileo API Server
  version: 1.961.4
servers:
  - url: http://localhost:8088
    description: Galileo API Server - local
paths:
  /login:
    post:
      tags:
        - auth
      summary: Login Email
      operationId: login_email_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_email_login_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /login/api_key:
    post:
      tags:
        - auth
      summary: Login Api Key
      operationId: login_api_key_login_api_key_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyLoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /login/social:
    post:
      tags:
        - auth
      summary: Login Social
      operationId: login_social_login_social_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
              examples:
                - id_token: token1234
                  provider: google
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /saml/login:
    get:
      tags:
        - auth
      summary: Saml Login
      operationId: saml_login_saml_login_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /saml/acs:
    post:
      tags:
        - auth
      summary: Saml Acs
      operationId: saml_acs_saml_acs_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /saml/metadata:
    get:
      tags:
        - auth
      summary: Saml Metadata
      operationId: saml_metadata_saml_metadata_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /logout:
    post:
      tags:
        - auth
      summary: Logout
      operationId: logout_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
  /presigned_url:
    get:
      tags:
        - auth
      summary: Get Presigned Url
      operationId: get_presigned_url_presigned_url_get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: api_url
          in: query
          required: true
          schema:
            type: string
            title: Api Url
        - name: method
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Method'
        - name: bucket_name
          in: query
          required: true
          schema:
            type: string
            title: Bucket Name
        - name: object_name
          in: query
          required: true
          schema:
            type: string
            title: Object Name
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid4
            title: Project Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPresignedUrlResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /verify_email:
    post:
      tags:
        - auth
      summary: Verify Email
      operationId: verify_email_verify_email_post
      parameters:
        - name: verification_token
          in: query
          required: true
          schema:
            type: string
            title: Verification Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
              examples:
                - email: user@example.com
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /token:
    get:
      tags:
        - auth
      summary: Get Token
      operationId: get_token_token_get
      deprecated: true
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: organization_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                format: uuid4
              - type: 'null'
            title: Organization Id
        - name: organization_slug
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Organization Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /refresh_token:
    post:
      tags:
        - auth
      summary: Refresh Token
      operationId: refresh_token_refresh_token_post
      parameters:
        - name: refresh_token
          in: cookie
          required: true
          schema:
            type: string
            title: Refresh Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /changelog:
    get:
      tags:
        - changelog
      summary: Get Current Changelog
      operationId: get_current_changelog_changelog_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootModel_Sequence_WeeklyChangelog__'
  /healthcheck:
    get:
      tags:
        - health
      summary: Healthcheck
      operationId: healthcheck_healthcheck_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'
  /healthcheck/postgres:
    get:
      tags:
        - health
      summary: Postgres Healthcheck
      description: 'PostgreSQL health check for external monitoring.


        Executes SELECT 1 query to verify database connectivity.

        Returns 200 if healthy, 503 if unhealthy.'
      operationId: postgres_healthcheck_healthcheck_postgres_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /healthcheck/clickhouse:
    get:
      tags:
        - health
      summary: Clickhouse Healthcheck
      description: 'ClickHouse health check for external monitoring.


        Executes SELECT 1 query to verify database connectivity.

        Returns 200 if healthy, 503 if unhealthy.'
      operationId: clickhouse_healthcheck_healthcheck_clickhouse_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /generate_password_reset_email:
    get:
      tags:
        - system_users_authentication
      summary: Generate Password Reset Email
      operationId: generate_password_reset_email_generate_password_reset_email_get
      parameters:
        - name: user_email
          in: query
          required: true
          schema:
            type: string
            format: email
            title: User Email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetEmailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /password_reset:
    post:
      tags:
        - system_users_authentication
      summary: Password Reset
      description: 'Reset a system user''s password.


        A password reset with a valid token should always verify the user. (See default
        of

        UserPasswordResetRequest.email_is_verified is True)'
      operationId: password_reset_password_reset_post
      parameters:
        - name: reset_token
          in: query
          required: true
          schema:
            type: string
            title: Reset Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPasswordResetRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUserDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /resend_verification_email:
    post:
      tags:
        - system_users_authentication
      summary: Resend Verification Email
      description: Resend verification email to an unverified user.
      operationId: resend_verification_email_resend_verification_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
              examples:
                - email: user@example.com
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerificationEmailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /user_roles:
    get:
      tags:
        - users
      summary: Get User Roles
      description: Get all user roles.
      operationId: get_user_roles_user_roles_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserRoleInfo'
                type: array
                title: Response Get User Roles User Roles Get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
  /request_access:
    post:
      tags:
        - users
      summary: Request Access
      description: 'Endpoint for a user to request access to the console.


        This is often the first step for a user to sign up for the console. The user
        record is created with

        `email_is_verified=None`, which signifies that the user has requested access
        but hasn''t been invited yet.'
      operationId: request_access_request_access_post
      parameters:
        - name: user_email
          in: query
          required: true
          schema:
            type: string
            format: email
            title: User Email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /signup_link:
    post:
      tags:
        - users
      summary: Generate Signup Link
      description: 'Generate a signup link for a new user and send it via email.


        This endpoint is used by admins in the console Command Center.

        We create an unverified user entry and send a signup email to the new user.


        When the show_invitation_link_and_reset_password feature flag is enabled,

        the signup URL is also returned in the API response. Otherwise, it is

        sent exclusively via email.


        The user is then verified via one of the following endpoints:

        - POST /users

        - POST /users/social'
      operationId: generate_signup_link_signup_link_post
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: user_email
          in: query
          required: true
          schema:
            type: string
            format: email
            title: User Email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSignupLinkResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /invite_users:
    post:
      tags:
        - users
      summary: Invite Users
      operationId: invite_users_invite_users_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUsersRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
  /users:
    post:
      tags:
        - users
      summary: Create Or Verify User
      description: 'Create a new system user with an email and password.


        If no admin exists (first user), the user will be created as an admin.


        Otherwise:

        - User record was already created when the admin invited the user

        - We should verify the user''s email'
      operationId: create_or_verify_user_users_post
      deprecated: true
      parameters:
        - name: signup_token
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Signup Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
              examples:
                - email: user@example.com
                  first_name: Alice
                  last_name: Appleseed
                  auth_method: email
                  password: Th3secret_
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUserDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - users
      summary: List Users
      operationId: list_users_users_get
      deprecated: true
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: starting_token
          in: query
          required: false
          schema:
            type: integer
            default: 0
            title: Starting Token
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUsersResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - users
      summary: Delete User Self
      operationId: delete_user_self_users_delete
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
  /system_users:
    post:
      tags:
        - users
      summary: Create Or Verify User
      description: 'Create a new system user with an email and password.


        If no admin exists (first user), the user will be created as an admin.


        Otherwise:

        - User record was already created when the admin invited the user

        - We should verify the user''s email'
      operationId: create_or_verify_user_system_users_post
      parameters:
        - name: signup_token
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Signup Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
              examples:
                - email: user@example.com
                  first_name: Alice
                  last_name: Appleseed
                  auth_method: email
                  password: Th3secret_
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUserDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/social:
    post:
      tags:
        - users
      summary: Create Or Verify User Social
      description: 'Create a user using a social login provider.


        All social users are created with `email_is_verified=True`, don''t need to
        be invited and are by default read-only

        (unless they are the first user, in which case they are set to admin).'
      operationId: create_or_verify_user_social_users_social_post
      deprecated: true
      parameters:
        - name: signup_token
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Signup Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
              examples:
                - id_token: token1234
                  provider: google
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUserDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /system_users/social:
    post:
      tags:
        - users
      summary: Create Or Verify User Social
      description: 'Create a user using a social login provider.


        All social users are created with `email_is_verified=True`, don''t need to
        be invited and are by default read-only

        (unless they are the first user, in which case they are set to admin).'
      operationId: create_or_verify_user_social_system_users_social_post
      parameters:
        - name: signup_token
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            title: Signup Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SocialLoginRequest'
              examples:
                - id_token: token1234
                  provider: google
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUserDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/all:
    post:
      tags:
        - users
      summary: List Users Paginated
      operationId: list_users_paginated_users_all_post
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: starting_token
          in: query
          required: false
          schema:
            type: integer
            default: 0
            title: Starting Token
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            title: Limit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryUserParams'
              default:
                filters: []
                sort:
                  name: created_at
                  ascending: false
                  sort_type: column
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUsersResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - users
      summary: List All Users
      description: 'List all users in the system.


        This endpoint is optimized to count project and runs for each user. This endpoint
        must be placed before

        `/users/{user_id}` so that "all" is not interpreted as a UUID4.'
      operationId: list_all_users_users_all_get
      deprecated: true
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetUserResponse'
                title: Response List All Users Users All Get
  /users/{user_id}:
    get:
      tags:
        - users
      summary: Get User
      operationId: get_user_users__user_id__get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - users
      summary: Update User
      operationId: update_user_users__user_id__put
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
              examples:
                - first_name: Tony
                  last_name: Newname
                  email: bigtony@rungalileo.io
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
        - users
      summary: Delete User
      operationId: delete_user_users__user_id__delete
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/runs/latest:
    get:
      tags:
        - users
      summary: Get Latest User Run
      description: Gets the most recent run for a User, ordered by last updated.
      operationId: get_latest_user_run_users__user_id__runs_latest_get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: User Id
        - name: project_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProjectType'
            default: gen_ai
        - name: starting_token
          in: query
          required: false
          schema:
            type: integer
            default: 0
            title: Starting Token
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserLatestRunsDB'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /users/{user_id}/runs:
    get:
      tags:
        - users
      summary: Get Project Runs For User
      description: 'Get all user created runs across all projects they can access.


        This returns a filtered list of projects with only runs created by this user.'
      operationId: get_project_runs_for_user_users__user_id__runs_get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
