  /public/v2/datasets/{dataset_id}/content:
    patch:
      tags:
        - datasets
      summary: Update Dataset Content
      description: 'Update the content of a dataset.


        The `index` and `column_name` fields are treated as keys tied to a specific
        version of the dataset.

        As such, these values are considered immutable identifiers for the dataset''s
        structure.


        For example, if an edit operation changes the name of a column, subsequent
        edit operations in

        the same request should reference the column using its original name.


        The `If-Match` header is used to ensure that updates are only applied if the
        client''s version of the dataset

        matches the server''s version. This prevents conflicts from simultaneous updates.
        The `ETag` header in the response

        provides the new version identifier after a successful update.'
      operationId: update_dataset_content_public_v2_datasets__dataset_id__content_patch
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: Dataset Id
        - name: If-Match
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: ETag of the dataset as a version identifier.
            title: If-Match
          description: ETag of the dataset as a version identifier.
          example: d89cce33-549d-4b6d-b220-afb641d859c8
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDatasetContentRequest'
      responses:
        '204':
          description: Dataset content updated successfully
          headers:
            ETag:
              description: New version identifier for the dataset
              schema:
                type: string
        '404':
          description: Dataset not found
        '412':
          description: ETag mismatch; client's If-Match does not match current resource
            version
        '422':
          description: Validation error in request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '423':
          description: Resource lock could not be acquired; another update may be
            in progress
    get:
      tags:
        - datasets
      summary: Get Dataset Content
      operationId: get_dataset_content_public_v2_datasets__dataset_id__content_get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: Dataset Id
        - name: starting_token
          in: query
          required: false
          schema:
            type: integer
            default: 0
            title: Starting Token
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetContent'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
        - datasets
      summary: Upsert Dataset Content
      description: Rollback the content of a dataset to a previous version.
      operationId: upsert_dataset_content_public_v2_datasets__dataset_id__content_put
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
        - HTTPBasic: []
      parameters:
