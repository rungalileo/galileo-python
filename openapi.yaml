        chainpoll_template:
          $ref: '#/components/schemas/FactualityTemplate'
          default:
            metric_system_prompt: "# Task\n\nYou will be given a prompt that was sent\
              \ to a large language model (LLM), and the LLM's response. Your task\
              \ is to assess whether the response is factually correct.\n\n## Task\
              \ output format\n\nYou must respond in the following JSON format:\n\n\
              ```\n{\n    \"explanation\": string\n    \"was_factual\": boolean\n\
              }\n```\n\n\"explanation\": Your step-by-step reasoning process. List\
              \ out the claims made in the response, and for each claim, provide a\
              \ detailed explanation of why that claim is or is not factual.\n\n\"\
              was_factual\": `true` if the response was completely factually correct\
              \ according to the instructions above, `false` otherwise.\n\nYou must\
              \ respond with a valid JSON string.\n\n## Task guidelines\n\n### Input\
              \ format\n\nIn some cases, the prompt may include multiple messages\
              \ of chat history. If so, each message will begin with one of the following\
              \ prefixes:\n\n- \"System: \"\n- \"Human: \"\n- \"AI: \"\n\n### How\
              \ to determine the value of `was_factual`\n\n- was_factual should be\
              \ false if anything in the response is factually incorrect, and true\
              \ otherwise.\n- If the response omits some useful information, but does\
              \ not include any falsehoods, was_factual should be true.\n- The prompt\
              \ itself may contain false information. If the response repeats this\
              \ false information, was_factual should be false. In other words, do\
              \ not assume that the prompt is factually correct when evaluating the\
              \ response.\n- If the prompt and response involve a domain where the\
              \ concept of \"factual accuracy\" doesn't strictly apply, assess whatever\
              \ quality of the response is most intuitively similar to factual accuracy.\
              \ For example, if the prompt asks the LLM to write code, assess whether\
              \ the code is free of syntax errors and implements the intended logic.\n\
              \n### Writing the explanation\n\n- As stated above, a typical explanation\
              \ should list out the claims made in the response, and for each claim,\
              \ provide a detailed explanation of why that claim is or is not factual.\n\
              - If the response doesn't make claims per se, break down the response\
              \ into constituent parts in the most natural way given its content.\
              \ For example, in code generation tasks, you might break down the response\
              \ into individual functions or lines of code.\n- Work step by step,\
              \ and do not give an overall assessment of the response until the end\
              \ of your explanation."
            value_field_name: was_factual
            explanation_field_name: explanation
            template: 'The prompt was:


              ```

              {query}

              ```


              The response was:


              ```

              {response}

              ```


              Respond with a JSON object having two fields: `explanation` (string)
              and `was_factual` (boolean). Everything in your response should be valid
              JSON.


              REMEMBER: if the prompt asks the LLM to compose an answer on the basis
              of a "context" or other reference text or texts, you MUST IGNORE these
              texts when evaluating the response. Evaluate the response as though
              the reference texts were NOT provided. Do NOT refer to these texts in
              your evaluation.'
            metric_few_shot_examples:
              - evaluating_response: "{\n    \"explanation\": \"The response makes\
                  \ several claims about the meaning of \\\"en passant\\\" in chess,\
                  \ then provides an illustrative example. Let's evaluate the claims\
                  \ first, then the example.\\n\\n# Claims\\n\\n1. The response claims\
                  \ that 'en passant' is a special rule in chess that allows a pawn\
                  \ to capture an enemy pawn that has moved two squares forward from\
                  \ its initial position, as if it had only moved one square forward.\
                  \ This claim is factually correct, as 'en passant' indeed allows\
                  \ for such a capture under specified conditions.\\n\\n2. The response\
                  \ also claims that this capture can only be done on the ensuing\
                  \ move and only if the capturing pawn was on its fifth rank at the\
                  \ time. This is also factually correct, as one of the requirements\
                  \ for the 'en passant' capture is that the capturing pawn must be\
                  \ on the fifth rank when the opponent's pawn moves two squares forward.\\\
                  n\\n# Illustrative Example\\n\\nFor the purposes of this metric,\
                  \ we'll say that a chess example like this one is \\\"correct\\\"\
                  \ if\\n\\n- All the moves are valid according to the rules of chess\\\
                  n- The example demonstrates what it is intended to demonstrate (in\
                  \ this case, the en passant rule)\\n\\nTo check these conditions,\
                  \ let's waslk through the example one move at a time, with a clear\
                  \ description of the board state after each move.\\n\\n### Initial\
                  \ Position\\nThe game starts with the standard initial setup of\
                  \ the chessboard.\\n\\n### Move 1\\n**1. e4 e5**\\n\\n- **White\
                  \ moves pawn from e2 to e4.**\\n  This opens lines for the bishop\
                  \ and queen and controls the center.\\n- **Black moves pawn from\
                  \ e7 to e5.**\\n  This mirrors White's move, also controlling the\
                  \ center.\\n\\n**Board State:**\\n```\\nr n b q k b n r\\np p p\
                  \     p p p\\n\\n        P\\n        p\\n\\nP P P     P P P\\nR\
                  \ N B Q K B N R\\n```\\n\\n### Move 2\\n**2. d4 d5**\\n\\n- **White\
                  \ moves pawn from d2 to d4.**\\n  Now, White controls more central\
                  \ space and threatens the pawn on e5.\\n- **Black moves pawn from\
                  \ d7 to d5.**\\n  Black counters by challenging the center with\
                  \ another pawn.\\n\\n**Board State:**\\n```\\nr n b q k b n r\\\
                  np p   p   p p p\\n\\n        P\\n  p P p P\\n\\nP   P     P P P\\\
                  nR N B Q K B N R\\n```\\n\\n### Move 3\\n**3. exd5 exd4**\\n\\n-\
                  \ **White captures the pawn on d5 with the pawn from e4 (exd5).**\\\
                  n  Now White has a pawn on d5.\\n- **Black incorrectly moves to\
                  \ exd4.**\\n  According to the rules of chess, this is an illegal\
                  \ move because the pawn on e5 cannot capture a pawn on d4 directly.\
                  \ The pawn on d4 does not exist; the move should capture diagonally\
                  \ if there is a piece or pawn on d4.\\n\\nSince there is an error\
                  \ in Move 3, the illustrative example is not factually correct according\
                  \ to the criteria listed above. Therefore, the example as a whole\
                  \ is not entirely factually correct.\",\n    \"was_factual\": false\n\
                  }"
                generation_prompt_and_response: 'The prompt was:


                  ```

                  I have heard people talking about the chess move "en passant", but
                  I don''t know what it is and how it works. Could you explain it
                  to me?

                  ```


                  The response was:


                  ```

                  Certainly! "En passant" is a special rule in chess that allows a
                  pawn to capture an enemy pawn that has moved two squares forward
                  from its initial position, as if it had only moved one square forward.
                  This can only be done on the ensuing move, and only if the capturing
                  pawn was on its fifth rank at the time the enemy pawn made its double-move.
                  Here''s an example to illustrate:


                  1. e4 e5

                  2. d4 d5 (this pawn now threatens to capture on e4 if White moves
                  their pawn)

                  3. exd5 (White captures the threatening pawn) exd4 (Black captures
                  in response)

                  4. c3 (White moves another pawn, but now Black has the opportunity
                  to use "en passant") dxc3 (Black captures the pawn on d4, as if
                  it had only moved one square forward)

                  5. Nxc3


                  I hope that helps!

                  ```


                  Respond with a JSON object having two fields: `explanation` (string)
                  and `was_factual` (boolean). Everything in your response should
                  be valid JSON.'
              - evaluating_response: "{\n    \"explanation\": \"The response claims\
