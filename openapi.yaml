          description: HTTP header name to use for API key authentication (e.g., 'X-API-Key',
            'Authorization').
        api_key_value:
          anyOf:
            - type: string
            - type: 'null'
          title: Api Key Value
          description: API key value to send in the specified header for authentication.
        custom_llm_config:
          anyOf:
            - $ref: '#/components/schemas/CustomLLMConfig'
            - type: 'null'
          description: Optional configuration for a custom LiteLLM handler class.
            When specified, the handler's acompletion() method is used instead of
            the default litellm.acompletion().
        custom_header_mapping:
          anyOf:
            - additionalProperties:
                type: string
              type: object
            - type: 'null'
          title: Custom Header Mapping
          description: Custom header mapping from internal fields (job_id, user_id,
            project_id, run_id) to custom header names to be included in LLM requests.
        headers:
          anyOf:
            - additionalProperties:
                type: string
              type: object
            - type: 'null'
          title: Headers
        id:
          anyOf:
            - type: string
              format: uuid4
            - type: 'null'
          title: Id
        name:
          type: string
          const: custom
          title: Name
          default: custom
        extra:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Extra
      type: object
      required:
        - base_url
      title: CustomIntegration
      description: 'Read model for custom integrations.


        api_key_value is not stored in extra (it''s encrypted in the token column),

        so we override the parent validator to skip requiring it on read.

        Headers are not returned on read (they''re encrypted and sensitive).'
    CustomIntegrationCreate:
      properties:
        multi_modal_config:
