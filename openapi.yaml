  /feedback-queues/{queue_id}:
    patch:
      tags:
        - scorer-feedback
      summary: Update Queue
      description: "Update a feedback queue by performing an action.\n\n**Supported\
        \ actions:**\n- \"abort\": Abort the feedback application process and return\
        \ the queue to pending state.\n  Used when user clicks \"Back\" or \"Cancel\"\
        \ during generation or review.\n  Clears draft_prompt and generation_task_id.\
        \ Same queue is reused.\n  Can be called during 'generating' or 'reviewing'\
        \ state.\n\n- \"complete\": Complete the queue after saving a new scorer version.\n\
        \  Used when user saves a new version from the review flow.\n  Sets status\
        \ to completed (immutable) and links queue to the resulting version.\n  Requires\
        \ target_scorer_version_id, result_scorer_id, and result_scorer_version_id.\n\
        \  Can only be called during 'reviewing' state.\n\n**Request body:**\n- action:\
        \ The action to perform (\"abort\" or \"complete\")\n- target_scorer_version_id:\
        \ Required for \"complete\" action - ID of the version feedback was applied\
        \ to\n- result_scorer_id: Required for \"complete\" action - ID of the scorer\
        \ that owns the result version.\n  For custom LLM scorers this is the same\
        \ as the queue's scorer. For preset scorers this is the\n  new custom scorer\
        \ duplicated from the preset.\n- result_scorer_version_id: Required for \"\
        complete\" action - ID of the scorer version created\n\n**Response:**\n- 200\
        \ OK with queue details showing updated status\n\n**Errors:**\n- 404 - Queue\
        \ not found or user doesn't have access\n- 409 - Queue is not in a valid state\
        \ for the requested action\n- 422 - Invalid action or missing required parameters"
      operationId: update_queue_feedback_queues__queue_id__patch
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
      parameters:
        - name: queue_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: Queue Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQueueRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateQueueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /feedback-queues/scorer/{scorer_id}/validation-runs:
    post:
      tags:
        - scorer-feedback
      summary: Validate Autotune Queue
      description: 'Test a draft prompt against feedback records in the active queue.


        Creates a metrics testing run by copying the feedback records and running

        generated scorer validation with the provided prompt. Used in the AutoTune

        Data tab for 3-column comparison: Original | Expected (Annotated) | New Result.


        Works in any active queue state (pending, generating, or reviewing).


        **Response:**

        - 202 Accepted with metrics_testing_run_id for viewing results


        **Errors:**

        - 404 - Scorer not found or no active queue exists

        - 422 - Queue has no feedback items or scorer has no version

        - 500 - Record processing failure'
      operationId: validate_autotune_queue_feedback_queues_scorer__scorer_id__validation_runs_post
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
      parameters:
        - name: scorer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: Scorer Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateAutotuneQueueRequest'
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateAutotuneQueueResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /feedback-queues/{queue_id}/validation-results:
    get:
      tags:
        - scorer-feedback
      summary: Get Validation Results
      description: "Poll autotune validation results for a feedback queue.\n\nReturns\
        \ one row per feedback item with the new scorer output joined in from\nthe\
        \ metrics testing run. Used by the UI for the 3-column comparison table:\n\
        Original Value | Expected (Annotated) | New Result.\n\n**Pollable:** Returns\
        \ status=pending with null scores while validation is running.\nTransitions\
        \ through pending → in_progress → completed as scores arrive.\n\n**Args:**\n\
        - metrics_testing_run_id: Optional metrics testing run ID (from validate response).\n\
        \  When provided, fetches scored records and joins with feedback items.\n\n\
        **Errors:**\n- 404 - Queue not found or user doesn't have access"
      operationId: get_validation_results_feedback_queues__queue_id__validation_results_get
      security:
        - APIKeyHeader: []
        - OAuth2PasswordBearer: []
      parameters:
        - name: queue_id
          in: path
          required: true
          schema:
            type: string
            format: uuid4
            title: Queue Id
        - name: metrics_testing_run_id
          in: query
          required: false
          schema:
            anyOf:
              - type: string
                format: uuid4
              - type: 'null'
            description: Metrics testing run ID for fetching validation scores
            title: Metrics Testing Run Id
          description: Metrics testing run ID for fetching validation scores
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutotuneValidationResultsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
