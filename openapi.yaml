    MetricDescriptions:
      type: string
      enum:
        - A measure of the model's own confusion in its output. Higher scores indicate
          higher uncertainty.
        - 'Measures whether the LLM''s response is supported by (or baked in) the
          context provided. '
        - Measures how well the LLM follows the system instructions provided in the
          prompt.
        - Measures how well the workflow's response aligns with the ground truth provided.
        - Detects whether the model selected the right Tool with the right arguments.
        - Detects whether the Tool executed successfully (i.e. without errors).
        - Measures whether the retrieved context has enough information to answer
          the user's query.
        - Measures the potential presence of factual errors or inconsistencies in
          the model's response.
        - Classifies the sentiment of the user's input into one of joy, love, fear,
          surprise, sadness, anger, annoyance, confusion or neutral.
        - Measures how 'sexist' a user's input might be perceived ranging in the values
          of 0-1 (1 being more sexist).
        - Measures the presence and severity of harmful, offensive, or abusive language
        - Tracks the presence of personal identifiable information in the user's input
        - Classifies the sentiment in the model's response into one of joy, love,
          fear, surprise, sadness, anger, annoyance, confusion or neutral.
        - Measures how 'sexist' a response might be perceived ranging in the values
          of 0-1 (1 being more sexist).
        - Measures the presence and severity of harmful, offensive, or abusive language
          in the model's response
        - Tracks the presence of personal identifiable information in the LLM's responses
        - Measures the presence of prompt injection attacks in inputs to the LLM.
        - Precision of top-K retrieved chunks, measuring the proportion of relevant
          chunks among the first K results.
        - Measures the perplexity of the prompt. Lower perplexity score is generally
          considered to be better because it means the model is less surprised by
          the text and can predict the next word in a sentence with higher accuracy.
        - Measures which documents or chunks retrieved were used by the model to generate
          a response.
        - Measures how much of the text in the retrieved chunks was used by the model
          to compose its response.
        - Evaluates whether each retrieved chunk is relevant to the query.
        - Position-weighted relevance score that accounts for the order of retrieved
          chunks.
        - A response-level metric measuring 'out of all the information in the context
          pertinent to the question, how much was covered in the answer?'
        - BLEU is a case-sensitive measurement of the difference between an model
          generation and target generation at the sentence-level.
        - ROUGE measures the unigram overlap between model generation and target generation
          as a single F-1 score.
        - Cost of executing the run and does not include any costs incurred for metric
          calculation.
        - Cost of all the metrics that call the OpenAI API.
        - Detects whether the user successfully accomplished or advanced towards their
          goal.
        - Detects whether the user successfully accomplished all of their goals.
        - Measures which documents or chunks retrieved were used by the model to generate
          a response, and how much of the text in the retrieved chunks was used by
          the model to compose its response.
        - Detects whether the agent followed the most efficient path to accomplish
          the user's goal.
        - Measures the correctness and coherence of an agentic trajectory by validating
          it against user-specified natural language tests.
        - Assesses whether a chatbot interaction left the user feeling satisfied and
          positive, or frustrated and dissatisfied, based on tone, engagement, and
          overall experience.
        - Detects a significant shift in the user's primary conversational goal or
          workflow during a session, relative to their initial stated intent.
        - Evaluates whether the SQL query semantically adheres to the natural language
          query.
        - 'Evaluates the SQL query on two independent binary dimensions: syntactic
          correctness and schematic adherence.'
        - Evaluates whether the SQL query is structurally efficient and free of common
          performance anti-patterns.
        - Detects SQL injection risks and other security exploits in the query.
        - Measures the coherence of the reasoning process by evaluating the consistency
          and logical flow of the reasoning steps.
        - Determines whether the input image / PDF is of sufficient quality to complete
          the given task.
        - Evaluates whether the generated image / PDF complies with the provided rules.
        - Identifies barge-ins by the user or the LLM in an audio conversation.
      title: MetricDescriptions
