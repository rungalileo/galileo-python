      description: 'Request to recompute metrics for a genai project run (log stream
        or experiment).

        This request is used to trigger recomputation of metrics based on the provided
        filters and scorer IDs.'
      examples:
        - filters:
            - case_sensitive: true
              name: input
              operator: eq
              type: text
              value: example input
          log_stream_id: 00000000-0000-0000-0000-000000000000
          pagination:
            limit: 5
            starting_token: 0
          sort:
            ascending: false
            name: updated_at
            sort_type: column
        - filter_tree:
            and:
              - or:
                  - filter:
                      name: input
                      operator: contains
                      type: text
                      value: abx
                  - filter:
                      name: output
                      operator: contains
                      type: text
                      value: xyz
              - filter:
                  name: session_id
                  operator: eq
                  type: id
                  value: 123e4567-e89b-42d3-a456-426614174000
          log_stream_id: 00000000-0000-0000-0000-000000000000
