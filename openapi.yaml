    MetricColorPickerBoolean:
      properties:
        type:
          type: string
          const: boolean
          title: Type
          default: boolean
        constraints:
          items:
            $ref: '#/components/schemas/BooleanColorConstraint'
          type: array
          minItems: 1
          title: Constraints
      type: object
      required:
        - constraints
      title: MetricColorPickerBoolean
      description: "Color picker configuration for boolean metrics.\n\nEach constraint\
        \ maps a boolean value to a color.\n\nExample:\n    {\n        \"type\": \"\
        boolean\",\n        \"constraints\": [\n            {\"color\": \"green\"\
        , \"operator\": \"eq\", \"value\": true},\n            {\"color\": \"red\"\
        , \"operator\": \"eq\", \"value\": false}\n        ]\n    }"
    MetricColorPickerCategorical:
      properties:
        type:
          type: string
          const: categorical
          title: Type
          default: categorical
        constraints:
          items:
            $ref: '#/components/schemas/CategoricalColorConstraint'
          type: array
          minItems: 1
          title: Constraints
      type: object
      required:
        - constraints
      title: MetricColorPickerCategorical
      description: "Color picker configuration for categorical metrics.\n\nEach constraint\
        \ maps one or more category values to a color. A category\nvalue must not\
        \ appear in more than one constraint.\n\nExample:\n    {\n        \"type\"\
        : \"categorical\",\n        \"constraints\": [\n            {\"color\": \"\
        green\", \"operator\": \"eq\", \"value\": \"pass\"},\n            {\"color\"\
        : \"red\", \"operator\": \"one_of\", \"value\": [\"fail\", \"error\"]}\n \
        \       ]\n    }"
    MetricColorPickerMultiLabel:
      properties:
        type:
          type: string
          const: multi_label
          title: Type
          default: multi_label
        constraints:
          items:
            $ref: '#/components/schemas/CategoricalColorConstraint'
          type: array
          minItems: 1
          title: Constraints
      type: object
      required:
        - constraints
      title: MetricColorPickerMultiLabel
      description: "Color picker configuration for multi-label metrics.\n\nBehaves\
        \ the same as categorical but intended for metrics that produce\nmultiple\
        \ labels. A category value must not appear in more than one constraint.\n\n\
        Example:\n    {\n        \"type\": \"multi_label\",\n        \"constraints\"\
        : [\n            {\"color\": \"green\", \"operator\": \"eq\", \"value\": \"\
        relevant\"},\n            {\"color\": \"yellow\", \"operator\": \"one_of\"\
        , \"value\": [\"partial\", \"related\"]}\n        ]\n    }"
    MetricColorPickerNumeric:
      properties:
        type:
          type: string
          const: numeric
          title: Type
          default: numeric
        constraints:
          items:
            $ref: '#/components/schemas/NumericColorConstraint'
          type: array
          minItems: 1
          title: Constraints
      type: object
      required:
        - constraints
      title: MetricColorPickerNumeric
      description: "Color picker configuration for numeric metrics.\n\nEach constraint\
        \ maps a numeric condition to a color. The UI uses these\nconstraints to color-code\
        \ metric values (e.g. green for high scores,\nred for low scores).\n\nExample:\n\
        \    {\n        \"type\": \"numeric\",\n        \"constraints\": [\n     \
        \       {\"color\": \"green\", \"operator\": \"gte\", \"value\": 0.8},\n \
        \           {\"color\": \"yellow\", \"operator\": \"between\", \"value\":\
        \ [0.3, 0.8]},\n            {\"color\": \"red\", \"operator\": \"lt\", \"\
        value\": 0.3}\n        ]\n    }"
