        endpoint:
          type: string
          title: Endpoint
          description: Endpoint URL for the custom integration.
        authentication_scope:
          anyOf:
            - type: string
            - type: 'null'
          title: Authentication Scope
          description: Optional scope for OAuth2 authentication.
        oauth2_token_url:
          anyOf:
            - type: string
            - type: 'null'
          title: Oauth2 Token Url
          description: OAuth2 token URL for custom OAuth2 authentication. If not provided,
            defaults to the endpoint.
        api_key_header:
          anyOf:
            - type: string
            - type: 'null'
          title: Api Key Header
          description: HTTP header name to use for API key authentication (e.g., 'X-API-Key',
            'Authorization').
        api_key_value:
          anyOf:
            - type: string
            - type: 'null'
          title: Api Key Value
          description: API key value to send in the specified header for authentication.
        custom_llm_config:
          anyOf:
            - $ref: '#/components/schemas/CustomLLMConfig'
            - type: 'null'
          description: Optional configuration for a custom LiteLLM handler class.
            When specified, the handler's acompletion() method is used instead of
            the default litellm.acompletion().
        custom_header_mapping:
          anyOf:
            - additionalProperties:
                type: string
              type: object
            - type: 'null'
